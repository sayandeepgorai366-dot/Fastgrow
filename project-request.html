<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FastGrow - Project Request</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>

:root{
--bg:#050505;
--card:rgba(255,255,255,.05);
--text:#ffffff;
--muted:#9ca3af;
--primary:#0A84FF;
--border:rgba(255,255,255,.08);
}

.light{
--bg:#f5f5f7;
--card:rgba(255,255,255,.75);
--text:#111111;
--muted:#666666;
--primary:#0A84FF;
--border:rgba(0,0,0,.08);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:var(--bg);
color:var(--text);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow-x:hidden;
transition:.4s;
}

/* BACKGROUND */

.blob1,
.blob2,
.blob3{
position:absolute;
border-radius:50%;
filter:blur(140px);
z-index:-10;
}

.blob1{
width:500px;
height:500px;
background:#0A84FF;
top:-150px;
left:-150px;
opacity:.25;
}

.blob2{
width:450px;
height:450px;
background:#7C3AED;
top:40%;
right:-120px;
opacity:.20;
}

.blob3{
width:400px;
height:400px;
background:#00C2FF;
bottom:-120px;
left:30%;
opacity:.15;
}

.form-popup{

width:100%;
max-width:550px;

padding:40px;

border-radius:28px;

background:var(--card);

backdrop-filter:blur(30px);

border:1px solid var(--border);

position:relative;

}

h2{

text-align:center;

font-size:2rem;

font-weight:900;

margin-bottom:25px;

}

input,
textarea,
select{

width:100%;

padding:14px;

margin:10px 0;

border:none;

outline:none;

border-radius:14px;

background:rgba(255,255,255,.05);

color:var(--text);

}

input::placeholder,
textarea::placeholder{

color:var(--muted);

}

textarea{

height:130px;

resize:none;

}

.submit-btn{

width:100%;

padding:16px;

margin-top:15px;

border:none;

border-radius:999px;

background:#0A84FF;

color:white;

font-weight:700;

font-size:1rem;

cursor:pointer;

}

.theme-btn{

position:absolute;

top:20px;

right:20px;

padding:10px 16px;

border:none;

border-radius:999px;

background:var(--card);

color:var(--text);

cursor:pointer;

}

</style>
</head>

<body>

<div class="blob1"></div>
<div class="blob2"></div>
<div class="blob3"></div>

<button id="themeToggle" class="theme-btn">
🌙 Theme
</button>

<div class="form-popup">

<h2>
Start Your Project
</h2>

<input
type="text"
id="name"
placeholder="Your Name">

<input
type="email"
id="email"
placeholder="Your Email">

<input
type="text"
id="business"
placeholder="Business Name">

<select id="websiteType">

<option value="">
Select Website Type
</option>

<option value="Business Website">
Business Website
</option>

<option value="E-Commerce">
E-Commerce
</option>

<option value="Portfolio">
Portfolio
</option>

<option value="Landing Page">
Landing Page
</option>

<option value="Custom Website">
Custom Website
</option>

</select>

<input
type="number"
id="pages"
placeholder="Number of Pages">

<input
type="number"
id="budget"
placeholder="Budget in ₹">

<textarea
id="description"
placeholder="Describe your project..."></textarea>

<button
id="submitProject"
class="submit-btn">

Submit Project

</button>

</div>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>

emailjs.init("9r-5S0m--YJK0PF-Q");

/* THEME */

const themeBtn =
document.getElementById("themeToggle");

if(localStorage.getItem("theme")==="light"){

document.body.classList.add("light");

themeBtn.innerHTML="☀️ Theme";

}

themeBtn.addEventListener("click",()=>{

document.body.classList.toggle("light");

if(document.body.classList.contains("light")){

localStorage.setItem("theme","light");

themeBtn.innerHTML="☀️ Theme";

}else{

localStorage.setItem("theme","dark");

themeBtn.innerHTML="🌙 Theme";

}

});

/* PROJECT SUBMIT */

document
.getElementById("submitProject")
.addEventListener("click",()=>{

const name =
document.getElementById("name").value;

const email =
document.getElementById("email").value;

const business =
document.getElementById("business").value;

const websiteType =
document.getElementById("websiteType").value;

const pages =
document.getElementById("pages").value;

const budget =
document.getElementById("budget").value;

const description =
document.getElementById("description").value;

if(
!name ||
!email ||
!business ||
!websiteType ||
!pages ||
!budget ||
!description
){

alert("Please fill all fields.");
return;

}

const templateParams = {

client_name: name,

client_email: email,

project_type: websiteType,

budget: "₹" + budget,

details:
"Business Name: " + business +
"\nPages: " + pages +
"\n\nDescription:\n" + description,

approve_link:
"Approval Pending"

};

emailjs.send(
"service_02pjvfs",
"template_w1nqhif",
templateParams
)

.then(()=>{

alert("✅ Project Request Submitted Successfully!");

document.getElementById("name").value="";
document.getElementById("email").value="";
document.getElementById("business").value="";
document.getElementById("websiteType").value="";
document.getElementById("pages").value="";
document.getElementById("budget").value="";
document.getElementById("description").value="";

})

.catch((error)=>{

console.log(error);

alert("❌ Email Sending Failed");

});

});

</script>

</body>
</html>
